name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npx eslint . --max-warnings=0 || echo "::warning::ESLint found issues (non-blocking until strict mode complete)"

      - name: Security audit (high+ severity)
        run: npm audit --omit=dev --audit-level=high || echo "::warning::npm audit found vulnerabilities (non-blocking; review manually)"

      - name: Run unit tests with coverage
        run: npx vitest run --coverage --reporter=default

      - name: Build
        run: npm run build

      - name: Check bundle size budget
        run: node scripts/check-bundle-size.mjs
